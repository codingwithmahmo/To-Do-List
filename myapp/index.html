<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To-Do</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Manrope:wght@200..800&family=Outfit:wght@100..900&family=Playfair:ital,opsz,wght@0,5..1200,300..900;1,5..1200,300..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
        <div class="heading-container">
            <header>
                <h1 class="main-heading">My Tasks</h1>
                <p class="subtitle">Stay on top of your day</p>
            </header>
        </div>

        <div class="input-row">
            <input
            type="text"
            id="taskInput"
            placeholder="Add a new task..."
            autocomplete="off"
            />
            <button class="add-button" id="addBtn">Add</button>
        </div>

        <ul class="task-box" id="taskList">

        </ul>
        <p class="empty-msg" id="emptyMsg">No tasks yet. Add one above ↑</p>
    </div>

    <script src="script.js"></script>
  </body>
</html>
